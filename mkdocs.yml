site_name: PG Notes
theme:
  name: material
  features:
    # - navigation.tabs          # 启用顶部标签页（可选）
    # - navigation.sections      # 左侧导航分组
    # - toc.integrate            # 将右侧目录集成到左侧（节省空间）
    - content.code.annotate    # 支持代码注释
    - content.code.copy        # 代码块复制按钮
  palette:
    - scheme: default
    - scheme: slate

# 👇 关键：自定义 CSS 来撑宽内容区
extra_css:
  - stylesheets/extra.css

# 👇 必须加这些扩展（代码高亮、代码块、折叠、提示框）
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

# 排除不需要发布的文件
exclude_docs: |
  .obsidian/**
  *.excalidraw.md
  README.md
  mkdocs.yml
  draw*.md

# 自动构建目录结构 (手动维护更精准)
# nav:
#   - 首页: index.md
#   - PostgreSQL:
#     - 0_Overview: QueryProcess/0_Overview.md
#     - 1_Parser: QueryProcess/1_Parser.md
